name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  PACKAGE_NAME: Flow.Launcher.Plugin.YoudaoTranslate.zip

jobs:
  build-release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PDM
        run: python -m pip install --upgrade pdm

      - name: Install dependencies
        run: pdm install -dG dev

      - name: Check lock file
        run: pdm lock -dG dev --check

      - name: Lint
        run: pdm run ruff check .

      - name: Type check
        run: pdm run ty check .

      - name: Build executable plugin
        run: pdm run python build.py -v "${{ github.ref_name }}" -t production

      - name: Pack release zip
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath '${{ env.PACKAGE_NAME }}') {
            Remove-Item -LiteralPath '${{ env.PACKAGE_NAME }}' -Force
          }
          Compress-Archive -Path 'dist/run/*' -DestinationPath '${{ env.PACKAGE_NAME }}' -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_NAME }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.PACKAGE_NAME }}
          fail_on_unmatched_files: true
          generate_release_notes: true
