name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
    tags-ignore:
      - "v*"

env:
  PYTHON_VERSION: "3.12"

jobs:
  check:
    name: Lint, type check, and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PDM
        run: python -m pip install --upgrade pdm

      - name: Install dependencies
        run: pdm install -dG dev

      - name: Check lock file
        run: pdm lock -dG dev --check

      - name: Lint
        run: pdm run ruff check .

      - name: Type check
        run: pdm run ty check .

      - name: Smoke test plugin entrypoint
        shell: pwsh
        run: |
          $request = @{ method = 'query'; parameters = @('ci-smoke') } | ConvertTo-Json -Compress
          pdm run python run.py $request

      - name: Build executable plugin
        run: pdm run python build.py -t production
